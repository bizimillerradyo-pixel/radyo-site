<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim İller Radyo</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #0a192f, #02060f);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* KART */
.card{
    width:420px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    text-align:center;
}

/* LOGO */
.logo{
    width:100px;
    height:100px;
    margin:auto;
}

.logo img{
    width:100%;
}

/* LIVE BUTTON */
.live-box{
    margin-top:20px;
    padding:22px;
    border-radius:16px;
    background:linear-gradient(135deg, rgba(120,180,255,0.25), rgba(160,120,255,0.25));
    cursor:pointer;
}

/* POPUP PLAYER */
.player-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:center;
    justify-content:center;
}

.player-box{
    width:90%;
    max-width:500px;
    background:#111;
    border-radius:16px;
    overflow:hidden;
}

.close{
    padding:10px;
    text-align:right;
    cursor:pointer;
    color:white;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">
        <img src="logo.png">
    </div>

    <h1>BİZİM İLLER RADYO</h1>

    <div class="live-box" onclick="openPlayer()">
        CANLI YAYIN AKTİF (TIKLA DİNLE)
    </div>

</div>

<!-- POPUP PLAYER -->
<div class="player-overlay" id="overlay">

    <div class="player-box">

        <div class="close" onclick="closePlayer()">KAPAT ✖</div>

        <iframe 
        width="100%" 
        height="300"
        src="https://radyo.yayindakiler.com/AudioPlayer/denizlibizimiller?mount=&">
        </iframe>

    </div>

</div>

<script>

function openPlayer(){
    document.getElementById("overlay").style.display = "flex";
}

function closePlayer(){
    document.getElementById("overlay").style.display = "none";
}

</script>

</body>
</html>
