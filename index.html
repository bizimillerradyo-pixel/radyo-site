<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim İller Radyo</title>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #0a192f, #050b18);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.bg-glow{
    position:absolute;
    width:700px;
    height:700px;
    background:rgba(120,180,255,0.08);
    filter:blur(140px);
    top:-250px;
    left:-250px;
}

.card{
    width:400px;
    padding:30px;
    border-radius:28px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    text-align:center;
    box-shadow:0 25px 70px rgba(0,0,0,0.6);
}

.logo{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:10px;
}

h1{
    margin:15px 0 5px;
    font-size:28px;
    letter-spacing:2px;
}

.sub{
    font-size:13px;
    opacity:0.6;
    margin-bottom:20px;
}

/* IFRAME PLAYER */
.player{
    border-radius:15px;
    overflow:hidden;
    margin-top:10px;
}

.player iframe{
    width:100%;
    height:120px;
    border:0;
}

/* CONTACT */
.contact{
    margin-top:15px;
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    font-size:13px;
}

.contact span{
    display:block;
    font-size:11px;
    opacity:0.6;
    margin-bottom:5px;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <h1>BİZİM İLLER</h1>
    <div class="sub">Tasavvufi Radyo • Sükunetin Sesi</div>

    <div class="player">
        <iframe src="https://radyo.yayindakiler.com/AudioPlayer/denizlibizimiller?mount=&"></iframe>
    </div>

    <div class="contact">
        <span>İletişim Numarası</span>
        0532 123 45 67
    </div>

</div>

</body>
</html>
