<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim İller Radyo</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #0a192f, #02060f);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* ARKA PLAN PARLAMA */
.bg-glow{
    position:absolute;
    width:800px;
    height:800px;
    background:rgba(120,170,255,0.06);
    filter:blur(160px);
    top:-300px;
    left:-300px;
}

/* ANA KART */
.card{
    width:420px;
    padding:35px 30px;
    border-radius:32px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    text-align:center;
    box-shadow:0 30px 90px rgba(0,0,0,0.7);
    position:relative;
}

/* LOGO */
.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:12px;
}

/* BAŞLIK */
h1{
    margin:18px 0 6px;
    font-size:30px;
    letter-spacing:3px;
    font-weight:500;
}

.sub{
    font-size:13px;
    opacity:0.5;
    margin-bottom:20px;
}

/* ÇİZGİ */
.divider{
    width:40px;
    height:2px;
    background:rgba(255,255,255,0.2);
    margin:10px auto 20px;
    border-radius:2px;
}

/* PLAYER */
.player{
    border-radius:16px;
    overflow:hidden;
    background:linear-gradient(
        180deg,
        rgba(255,255,255,0.04),
        rgba(255,255,255,0.01)
    );
    border:1px solid rgba(255,255,255,0.08);
    padding:10px;
}

#radioStatus{
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    opacity:0.75;
}

/* İLETİŞİM */
.contact{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:linear-gradient(
        135deg,
        rgba(120,180,255,0.25),
        rgba(160,120,255,0.25)
    );
    border:1px solid rgba(255,255,255,0.12);
    font-size:13px;
    color:white;
}

.contact span{
    display:block;
    font-size:11px;
    opacity:0.7;
    margin-bottom:6px;
    letter-spacing:1px;
}

/* FOOTER */
.footer{
    margin-top:15px;
    font-size:11px;
    opacity:0.35;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <h1>BİZİM İLLER RADYO</h1>

    <div class="sub">
        '' 24 Saat Huzur ''
    </div>

    <div class="divider"></div>

    <div class="player">
        <div id="radioStatus">Yayın hazırlanıyor...</div>
        <audio id="radio" autoplay playsinline preload="auto"></audio>
    </div>

    <div class="contact">
        <span>İLETİŞİM</span>
        <strong>0(258) 261 38 88</strong>
    </div>

    <div class="footer">
        Bizim İller Radyo © Biz Bize Ajans 2026
    </div>

</div>

<script>
const radio = document.getElementById("radio");
const statusText = document.getElementById("radioStatus");

const STREAM_URL = "https://radyo.yayindakiler.com:4078/stream";

let reconnectTimer = null;

function setStatus(text) {
    statusText.textContent = text;
}

function startRadio() {
    if (!radio.src) {
        radio.src = STREAM_URL;
    }

    radio.volume = 1;

    radio.play()
        .then(() => {
            setStatus("Canlı yayın açık");
        })
        .catch(() => {
            setStatus("Yayını başlatmak için ekrana dokunun");
        });
}

function reconnectRadio() {
    clearTimeout(reconnectTimer);

    setStatus("Yayın yeniden bağlanıyor...");

    reconnectTimer = setTimeout(() => {
        radio.pause();
        radio.removeAttribute("src");
        radio.load();

        radio.src = STREAM_URL + "?t=" + Date.now();
        startRadio();
    }, 3000);
}

radio.addEventListener("playing", () => {
    setStatus("Canlı yayın açık");
});

radio.addEventListener("waiting", () => {
    setStatus("Yayın yükleniyor...");
});

radio.addEventListener("error", reconnectRadio);
radio.addEventListener("stalled", reconnectRadio);
radio.addEventListener("ended", reconnectRadio);

document.addEventListener("click", startRadio, { once: true });
document.addEventListener("touchstart", startRadio, { once: true });

startRadio();
</script>

</body>
</html>
