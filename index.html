<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bizim İller Radyo</title>

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #1e3c72, #0a192f);
    color:white;
}

/* NAVBAR */
.nav {
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    font-size:14px;
    opacity:0.8;
}

/* ANA ALAN */
.hero {
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* LOGO */
.logo {
    width:120px;
    height:120px;
    border:2px solid rgba(255,255,255,0.3);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    backdrop-filter: blur(10px);
}

/* BAŞLIK */
h1 {
    font-size:64px;
    margin:20px 0 10px;
    letter-spacing:3px;
}

.sub {
    opacity:0.7;
    margin-bottom:40px;
}

/* PLAY */
.play {
    width:90px;
    height:90px;
    border-radius:50%;
    border:none;
    background:white;
    color:#0a192f;
    font-size:30px;
    cursor:pointer;
    transition:0.3s;
}

.play:hover {
    transform:scale(1.15);
}

/* STATUS */
.status {
    margin-top:20px;
    font-size:14px;
    opacity:0.6;
}

/* ALT BİLGİ */
.footer {
    text-align:center;
    padding:30px;
    opacity:0.5;
    font-size:13px;
}
</style>
</head>

<body>

<div class="nav">
    <div>📡 CANLI</div>
    <div>📞 0532 123 45 67</div>
</div>

<div class="hero">

    <div class="logo">🎤</div>

    <h1>BİZİM İLLER</h1>
    <div class="sub">Memleketin Sesi</div>

    <button class="play" onclick="toggleRadio()">▶</button>

    <div class="status" id="status">Hazır</div>

</div>

<div class="footer">
Bizim İller Radyo © 2026
</div>

<audio id="radio" src="https://radyo.yayindakiler.com/AudioPlayer/denizlibizimiller"></audio>

<script>
let isPlaying = false;
let radio = document.getElementById("radio");

function toggleRadio() {
    if(!isPlaying){
        radio.play();
        document.querySelector(".play").innerText = "⏸";
        document.getElementById("status").innerText = "Canlı Yayın";
        isPlaying = true;
    } else {
        radio.pause();
        document.querySelector(".play").innerText = "▶";
        document.getElementById("status").innerText = "Durduruldu";
        isPlaying = false;
    }
}
</script>

</body>
</html>
