<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim İller Radyo</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #0a192f, #02060f);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* ARKA PLAN */
.bg-glow{
    position:absolute;
    width:800px;
    height:800px;
    background:rgba(120,170,255,0.06);
    filter:blur(160px);
    top:-300px;
    left:-300px;
}

/* KART */
.card{
    width:420px;
    padding:35px 30px;
    border-radius:32px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    text-align:center;
    box-shadow:0 30px 90px rgba(0,0,0,0.7);
}

/* LOGO */
.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:12px;
}

/* BAŞLIK */
h1{
    margin:18px 0 6px;
    font-size:30px;
    letter-spacing:3px;
    font-weight:500;
}

.sub{
    font-size:13px;
    opacity:0.5;
    margin-bottom:20px;
}

/* ÇİZGİ */
.divider{
    width:40px;
    height:2px;
    background:rgba(255,255,255,0.2);
    margin:10px auto 20px;
    border-radius:2px;
}

/* CANLI YAYIN BUTONU */
.live-box{
    padding:22px;
    border-radius:18px;
    background:linear-gradient(135deg, rgba(120,180,255,0.25), rgba(160,120,255,0.25));
    border:1px solid rgba(255,255,255,0.12);
    cursor:pointer;
    transition:0.3s;
}

.live-box:hover{
    transform:scale(1.02);
}

.live-status{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:14px;
    letter-spacing:1px;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#ff3b3b;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:0.3}
}

/* İLETİŞİM */
.contact{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:linear-gradient(135deg, rgba(120,180,255,0.25), rgba(160,120,255,0.25));
    border:1px solid rgba(255,255,255,0.12);
    font-size:13px;
}

.contact span{
    display:block;
    font-size:11px;
    opacity:0.7;
    margin-bottom:6px;
    letter-spacing:1px;
}

.footer{
    margin-top:15px;
    font-size:11px;
    opacity:0.35;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <h1>BİZİM İLLER</h1>

    <div class="sub">
        Tasavvufi Radyo • Sükunetin Sesi
    </div>

    <div class="divider"></div>

    <!-- TIKLANINCA ÇALAN ALAN -->
    <div class="live-box" onclick="startRadio()">
        <div class="live-status">
            <div class="dot"></div>
            CANLI YAYIN AKTİF (BAŞLAT)
        </div>
    </div>

    <div class="contact">
        <span>İLETİŞİM</span>
        <strong>0532 123 45 67</strong>
    </div>

    <div class="footer">
        Bizim İller Radyo © 2026
    </div>

</div>

<!-- RADYO -->
<audio id="radio">
    <source src="https://radyo.yayindakiler.com/listen/denizlibizimiller/radio.mp3" type="audio/mpeg">
</audio>

<script>
let started = false;
const radio = document.getElementById("radio");
radio.volume = 1;

function startRadio(){
    if(!started){
        radio.play();
        started = true;

        document.querySelector(".live-status").innerHTML = `
            <div class="dot"></div>
            CANLI YAYIN AKTİF
        `;
    }
}
</script>

</body>
</html>
