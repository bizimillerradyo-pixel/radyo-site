<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim İller Radyo</title>

<style>
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #0a192f, #02060f);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* SOFT AMBIENT GLOW */
.bg-glow{
    position:absolute;
    width:800px;
    height:800px;
    background:rgba(120,170,255,0.06);
    filter:blur(160px);
    top:-300px;
    left:-300px;
}

/* PREMIUM CARD */
.card{
    width:420px;
    padding:35px 30px;
    border-radius:32px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    text-align:center;
    box-shadow:0 30px 90px rgba(0,0,0,0.7);
    position:relative;
}

/* LOGO */
.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:12px;
}

/* TITLE */
h1{
    margin:18px 0 6px;
    font-size:30px;
    letter-spacing:3px;
    font-weight:500;
}

.sub{
    font-size:13px;
    opacity:0.5;
    margin-bottom:20px;
}

/* DIVIDER */
.divider{
    width:40px;
    height:2px;
    background:rgba(255,255,255,0.2);
    margin:10px auto 20px;
    border-radius:2px;
}

/* PLAYER */
.player{
    border-radius:16px;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border:1px solid rgba(255,255,255,0.08);
    padding:10px;
}

.player-header{
    font-size:11px;
    letter-spacing:1px;
    opacity:0.5;
    text-align:left;
    margin-bottom:8px;
}

.player iframe{
    width:100%;
    height:110px;
    border-radius:10px;
    border:0;
    background:black;
}

/* CONTACT */
.contact{
    color: white;
}
.contact{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:linear-gradient(135deg, rgba(120,180,255,0.25), rgba(160,120,255,0.25));
    border:1px solid rgba(255,255,255,0.12);
    font-size:13px;
    transition:0.3s;
}

.contact:hover{
    background:linear-gradient(135deg, rgba(120,180,255,0.35), rgba(160,120,255,0.35));
}

.contact:hover{
    background:rgba(255,255,255,0.07);
}

.contact span{
    display:block;
    font-size:11px;
    opacity:0.5;
    margin-bottom:6px;
    letter-spacing:1px;
}

/* FOOT NOTE */
.footer{
    margin-top:15px;
    font-size:11px;
    opacity:0.35;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <h1>BİZİM İLLER RADYO</h1>
    <div class="sub">'' 24 Saat Huzur ''</div>

    <div class="divider"></div>

    <div class="player">
        <iframe src="https://radyo.yayindakiler.com/AudioPlayer/denizlibizimiller?mount=&"></iframe>
    </div>

  <div class="contact">
    <span>İLETİŞİM</span>
    <strong>0 (258) 261 38 88</strong>
</div>

    <div class="footer">Bizim İller Radyo © 2026 Biz Bize Ajans</div>

</div>

</body>
</html>
