<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bizim İller Radyo</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top, #0a192f, #02060f);
    color:white;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.bg-glow{
    position:absolute;
    width:800px;
    height:800px;
    background:rgba(120,170,255,0.06);
    filter:blur(160px);
    top:-300px;
    left:-300px;
}

.card{
    width:420px;
    padding:35px 30px;
    border-radius:32px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(30px);
    text-align:center;
    box-shadow:0 30px 90px rgba(0,0,0,0.7);
    position:relative;
}

.logo{
    width:110px;
    height:110px;
    margin:auto;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.04);
    display:flex;
    align-items:center;
    justify-content:center;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    padding:12px;
}

h1{
    margin:18px 0 6px;
    font-size:30px;
    letter-spacing:3px;
    font-weight:500;
}

.sub{
    font-size:13px;
    opacity:0.5;
    margin-bottom:20px;
}

.divider{
    width:40px;
    height:2px;
    background:rgba(255,255,255,0.2);
    margin:10px auto 20px;
    border-radius:2px;
}

/* CANLI YAYIN PANELİ */

.live-box{
    padding:22px;
    border-radius:18px;
    background:linear-gradient(
        180deg,
        rgba(255,255,255,0.04),
        rgba(255,255,255,0.01)
    );
    border:1px solid rgba(255,255,255,0.08);
}

.live-status{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:14px;
    letter-spacing:1px;
    opacity:0.9;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#ff3b3b;
    animation:pulse 1.2s infinite;
}

@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:0.3}
}

.contact{
    margin-top:18px;
    padding:14px;
    border-radius:14px;
    background:linear-gradient(
        135deg,
        rgba(120,180,255,0.25),
        rgba(160,120,255,0.25)
    );
    border:1px solid rgba(255,255,255,0.12);
    font-size:13px;
    color:white;
}

.contact span{
    display:block;
    font-size:11px;
    opacity:0.7;
    margin-bottom:6px;
    letter-spacing:1px;
}

.footer{
    margin-top:15px;
    font-size:11px;
    opacity:0.35;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">

    <div class="logo">
        <img src="logo.png" alt="logo">
    </div>

    <h1>BİZİM İLLER RADYO</h1>

    <div class="sub">
        ''24 Saat Huzur''
    </div>

    <div class="divider"></div>

    <div class="live-box">
        <div class="live-status">
            <div class="dot"></div>
            CANLI YAYIN AKTİF
        </div>
    </div>

    <div class="contact">
        <span>İLETİŞİM</span>
        <strong>0(258) 261 38 88</strong>
    </div>

    <div class="footer">
        Bizim İller Radyo © Biz Bize Ajans 2026
    </div>

</div>

<!-- GİZLİ OTOMATİK YAYIN -->
<audio id="radio" autoplay controls hidden>
    <source src="https://radyo.yayindakiler.com/listen/denizlibizimiller/radio.mp3" type="audio/mpeg">
</audio>

<script>
const radio = document.getElementById("radio");

radio.volume = 1;

document.body.addEventListener("click", () => {
    radio.play();
}, { once:true });
</script>

</body>
</html>
